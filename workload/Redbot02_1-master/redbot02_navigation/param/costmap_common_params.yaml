# footprint: [[-0.33, -0.28], [-0.33, 0.28], [0.33, 0.28], [0.33, -0.28]] # robot size (based on center) 
footprint: [[-0.30, -0.225], [-0.30, 0.225], [0.30, 0.225], [0.30, -0.225]] # redbot02 robot size (based on center) 

#robot_radius: 0.105

map_type: costmap
observation_sources: scan
scan: {sensor_frame: lidar_scan, data_type: LaserScan, topic: scan_filtered, marking: true, clearing: true}
# scan: {sensor_frame: lidar_scan, data_type: LaserScan, topic: scan, marking: true, clearing: true}

obstacle_layer:
  enabled: true
  obstacle_range: 4.0 #2.0
  raytrace_range: 4.0
  inflation_radius: 0.2
  track_unknown_space: false
  combination_method: 1
  clearing: true

inflation_layer:
  enabled:              true
  cost_scaling_factor:  10.0  # exponential rate at which the obstacle cost drops off (default: 10)
  inflation_radius:     0.35 #0.4  # max. distance from an obstacle at which costs are incurred for planning paths.