local_costmap:
  global_frame: odom
  robot_base_frame: base_footprint

  update_frequency: 10.0
  publish_frequency: 10.0
  transform_tolerance: 0.5  

  static_map: false  #costmap size
  rolling_window: true
  width: 5
  height: 5
  resolution: 0.05

  obstacle_layer:
    enabled: true
    obstacle_range: 3.0 #2.0
    raytrace_range: 4.0
    inflation_radius: 0.2
    track_unknown_space: false
    combination_method: 1
    clearing: true

  inflation_layer:
    enabled:              true
    cost_scaling_factor:  10  # exponential rate at which the obstacle cost drops off (default: 10)
    inflation_radius:     0.35 #0.4  # max. distance from an obstacle at which costs are incurred for planning paths.